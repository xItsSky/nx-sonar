name: Feature request
description: Suggest an enhancement.
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: "Problem"
      description: "What problem are you trying to solve?"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: "Proposed solution"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives considered"
